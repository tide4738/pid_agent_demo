name: Python package

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      MPLBACKEND: Agg
    strategy:
      matrix:
        python-version: ['3.10', '3.11']

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install system dependencies for scientific packages
      run: |
        sudo apt-get update
        sudo apt-get install -y libfreetype6-dev libpng-dev pkg-config

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Run tests
      run: |
        pytest -q

    - name: Debug: show python info
      if: always()
      run: |
        echo "Runner: $(uname -a)"
        python --version
        which python || where python || true
        python -c "import sys,platform; print(sys.executable, sys.path, platform.platform())"
